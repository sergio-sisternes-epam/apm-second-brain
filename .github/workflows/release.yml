name: Release

on:
  push:
    tags:
      - '*--v*'

permissions:
  contents: write

jobs:
  release:
    name: Pack and release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_NAME="${TAG%--v*}"
          PKG_VERSION="${TAG##*--v}"
          echo "pkg_name=$PKG_NAME"       >> "$GITHUB_OUTPUT"
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install APM CLI
        run: pip install "apm-cli==0.25.0" pyyaml

      - name: Enable marketplace authoring
        run: apm experimental enable marketplace-authoring

      - name: Validate package directory exists
        run: |
          PKG_DIR="packages/${{ steps.tag.outputs.pkg_name }}"
          if [ ! -d "$PKG_DIR" ]; then
            echo "ERROR: $PKG_DIR not found for tag ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Validate tag version matches manifest
        run: |
          MANIFEST_VER=$(python3 -c "
          import yaml, sys
          d = yaml.safe_load(open('packages/${{ steps.tag.outputs.pkg_name }}/apm.yml'))
          sys.stdout.write(str(d['version']))
          ")
          TAG_VER="${{ steps.tag.outputs.pkg_version }}"
          if [ "$MANIFEST_VER" != "$TAG_VER" ]; then
            echo "ERROR: tag says v${TAG_VER} but apm.yml declares ${MANIFEST_VER}" >&2
            exit 1
          fi
          echo "Version match: $MANIFEST_VER"

      - name: Run marketplace check
        run: apm marketplace check

      - name: Verify marketplace.json is current
        run: apm pack --dry-run --check-clean

      - name: Regenerate marketplace.json
        run: apm pack

      - name: Commit updated marketplace.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "marketplace.json unchanged"
          else
            git commit -m "chore(marketplace): regen after ${{ github.ref_name }}"
            git push origin HEAD:main
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ steps.tag.outputs.pkg_name }} v${{ steps.tag.outputs.pkg_version }}" \
            --generate-notes
