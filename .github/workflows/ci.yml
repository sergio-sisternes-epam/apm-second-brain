name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Include ready_for_review so converting a draft to ready re-triggers CI
    # even when no new commits are pushed.
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for private context
        # Delegates to the shared scanner script so CI and conformance tests
        # exercise exactly the same implementation.
        run: bash scripts/scan-private-context.sh

  test-conformance:
    name: OKF conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install pytest pyyaml jsonschema
      - name: Run conformance suite
        run: |
          # Collect root conformance tests plus every package-level conformance dir.
          DIRS="tests/conformance/"
          for pkg_tests in packages/*/tests/conformance; do
            [ -d "$pkg_tests" ] && DIRS="$DIRS $pkg_tests"
          done
          python3 -m pytest $DIRS -v

  apm-validate:
    name: APM package validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install APM CLI
        run: pip install "apm-cli==0.25.0"
      - name: Enable marketplace authoring
        run: apm experimental enable marketplace-authoring
      - name: Validate marketplace entries
        run: |
          # On PRs use offline mode (release tags may not exist yet).
          # On push to main use full network validation.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            apm marketplace check --offline
          else
            apm marketplace check
          fi
      - name: Dry-run pack each standalone package
        run: |
          # Validate each package that has no local-path dependencies.
          # Packages with local-path deps (e.g. "../other-pkg") cannot be
          # packed in isolation; they are covered by the root-level apm pack below.
          find . -mindepth 2 -name "apm.yml" ! -path "*/.apm/*" -exec dirname {} \; \
            | sort -u \
            | while read pkg_dir; do
                if grep -qE '^\s+- \.\.' "$pkg_dir/apm.yml" 2>/dev/null; then
                  echo "--- skipping $pkg_dir (local-path dependencies; validated by root pack) ---"
                  continue
                fi
                echo "--- dry-run pack: $pkg_dir ---"
                (cd "$pkg_dir" && apm install && apm pack --dry-run) || exit 1
              done
      - name: Check for manifest drift after apm install
        run: |
          # apm install during pack validation must not mutate committed manifests/locks.
          if [ -n "$(git diff --name-only packages/*/apm.yml packages/*/apm.lock.yaml)" ]; then
            echo "::error::apm install mutated package manifests or lockfiles. Commit the updated files."
            git diff packages/*/apm.yml packages/*/apm.lock.yaml
            exit 1
          fi
          echo "No manifest/lock drift detected."
      - name: Pack and verify marketplace.json is current
        run: |
          # Write marketplace.json and confirm it matches what was committed.
          # Using git status is more reliable than --check-clean which only
          # prints an informational message without a guaranteed non-zero exit.
          apm pack
          if [ -n "$(git status --porcelain .claude-plugin/marketplace.json)" ]; then
            echo "::error::marketplace.json is out of date -- run 'apm pack' and commit the result."
            git diff .claude-plugin/marketplace.json || true
            exit 1
          fi
          echo "marketplace.json is current."
