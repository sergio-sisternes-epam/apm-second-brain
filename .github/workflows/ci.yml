name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Include ready_for_review so converting a draft to ready re-triggers CI
    # even when no new commits are pushed.
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for private context
        run: |
          # Fail if any non-workflow file references internal paths or private markers.
          # Exclude the entire .github/workflows/ directory: every workflow file embeds
          # the scanner's own pattern strings and must not be falsely flagged.
          if grep -rn \
            -e "epam-agent-forge" \
            -e "Users/sergio_sisternes" \
            -e "EPAM All Rights Reserved" \
            --include="*.md" --include="*.yml" --include="*.yaml" \
            --include="*.json" --include="*.py" --include="*.mjs" \
            --exclude-dir=".github" \
            .; then
            echo "Private context found -- remove before merging" && exit 1
          fi
          echo "Clean"

  test-conformance:
    name: OKF conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install pytest pyyaml jsonschema
      - name: Run conformance suite
        run: |
          # Collect root conformance tests plus every package-level conformance dir.
          DIRS="tests/conformance/"
          for pkg_tests in packages/*/tests/conformance; do
            [ -d "$pkg_tests" ] && DIRS="$DIRS $pkg_tests"
          done
          python3 -m pytest $DIRS -v

  apm-validate:
    name: APM package validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install APM CLI
        run: pip install "apm-cli==0.25.0"
      - name: Enable marketplace authoring
        run: apm experimental enable marketplace-authoring
      - name: Validate marketplace entries
        run: |
          # On PRs use offline mode (release tags may not exist yet).
          # On push to main use full network validation.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            apm marketplace check --offline
          else
            apm marketplace check
          fi
      - name: Dry-run pack
        run: apm pack --dry-run
      - name: Verify marketplace.json is committed and current
        run: apm pack --dry-run --check-clean
